profiles:
  financial_services:
    display_name: Financial Services
    required_topics:
      - banking_ai
      - wealth_management
      - regulatory_policy
      - operational_resilience
      - model_risk
      - digital_transformation
    preferred_source_types:
      - regulatory
      - official
      - company
      - academic
      - high_quality_media
    required_tools:
      - regulatory_fetcher_tool
      - rss_fetcher_tool
      - market_fetcher_tool
      - arxiv_fetcher_tool
    queries:
      arxiv:
        - banking artificial intelligence model risk
        - financial services operational resilience AI
      rss:
        - banking AI governance
        - wealth management digital transformation
    feeds:
      regulatory:
        - source: Federal Reserve
          url: https://www.federalreserve.gov/feeds/press_all.xml
      rss:
        - source: BIS
          url: https://www.bis.org/list/press_releases/index.rss
    synthetic_items:
      regulatory_fetcher_tool:
        - title: Synthetic regulator updates supervisory expectations for third-party AI vendors
          source: Synthetic Regulator
          source_type: regulatory
          evidence_level: primary
          summary: A synthetic supervisory bulletin asks banks to document vendor oversight, model validation, audit trails, and incident escalation for AI-enabled customer workflows.
          url: https://example.org/risklens-demo/financial-services/regulator-ai-vendor-oversight
        - title: Synthetic regulator reviews model risk controls in digital lending programs
          source: Synthetic Regulator
          source_type: regulatory
          evidence_level: primary
          summary: A synthetic review identifies gaps in explainability, challenger testing, and board reporting for AI-assisted credit and onboarding tools.
          url: https://example.org/risklens-demo/financial-services/model-risk-digital-lending
      rss_fetcher_tool:
        - title: Synthetic company disclosure describes wealth advisor AI assistant controls
          source: Synthetic Company Disclosure
          source_type: company
          evidence_level: primary
          summary: A synthetic bank disclosure describes permissioning, human review, customer suitability guardrails, and logging for wealth management AI assistants.
          url: https://example.org/risklens-demo/financial-services/wealth-ai-controls
        - title: Synthetic industry media reports banks moving AI pilots into controlled production
          source: Synthetic Industry Media
          source_type: media
          evidence_level: secondary
          summary: A synthetic industry article reports that banks are moving from AI experiments to governed production workflows with stronger operational resilience checks.
          url: https://example.org/risklens-demo/financial-services/controlled-ai-production
        - title: Synthetic company disclosure outlines digital transformation risk committee
          source: Synthetic Company Disclosure
          source_type: company
          evidence_level: primary
          summary: A synthetic filing describes a cross-functional committee for AI change management, vendor risk, data quality, and customer communication controls.
          url: https://example.org/risklens-demo/financial-services/transformation-risk-committee
      arxiv_fetcher_tool:
        - title: Synthetic academic study benchmarks hallucination risk in banking copilots
          source: Synthetic Academic Source
          source_type: academic
          evidence_level: secondary
          summary: A synthetic research note compares retrieval controls, evaluation datasets, and escalation policies for banking copilots used in regulated workflows.
          url: https://example.org/risklens-demo/financial-services/academic-banking-copilot-risk
        - title: Synthetic academic source evaluates operational resilience of AI decision support
          source: Synthetic Academic Source
          source_type: academic
          evidence_level: secondary
          summary: A synthetic paper studies fallback procedures, monitoring thresholds, and incident response for AI decision support in financial institutions.
          url: https://example.org/risklens-demo/financial-services/academic-ai-resilience
      market_fetcher_tool:
        - title: Synthetic market adapter flags rising spend on bank AI governance tooling
          source: Synthetic Market Data Adapter
          source_type: market
          evidence_level: secondary
          summary: A synthetic market signal indicates increasing procurement activity for AI monitoring, policy enforcement, and model inventory platforms.
          url: https://example.org/risklens-demo/financial-services/market-ai-governance-spend
        - title: Synthetic central bank note highlights operational resilience investment
          source: Synthetic Central Bank
          source_type: official
          evidence_level: primary
          summary: A synthetic central bank note links technology modernization with resilience testing, third-party concentration monitoring, and governance reporting.
          url: https://example.org/risklens-demo/financial-services/central-bank-resilience-investment

