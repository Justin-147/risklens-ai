name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Verify line endings
        run: python scripts/verify_line_endings.py

      - name: Compile
        run: python -m compileall src tests scripts

      - name: Mypy
        run: mypy src/risklens

      - name: Pytest
        run: pytest

      - name: Validate config
        run: python -m risklens.main validate

      - name: CLI smoke pipeline
        run: >
          python -m risklens.main run --profile financial_services --mock
          --as-of 2026-07-06 --output-root .tmp/ci-output

      - name: CLI smoke agent
        run: >
          python -m risklens.main agent-run --profile financial_services --mock
          --max-iterations 3 --simulate-gap --as-of 2026-07-06
          --output-root .tmp/ci-output

      - name: Build package
        run: python -m build
